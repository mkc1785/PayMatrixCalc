name: 📋 Weekly Backlinks + Meta Optimizer

on:
  schedule:
    - cron: '30 1 * * 0'   # Sunday 7 AM IST (1:30 AM UTC)
  workflow_dispatch:

jobs:
  weekly_tasks:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests google-auth google-auth-httplib2

      - name: 📋 Backlink Drafter — generate Reddit/Quora answers
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/backlink_drafter.py

      - name: 🎯 Meta Optimizer — rewrite weak title/meta tags
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_SA_JSON: ${{ secrets.GOOGLE_SA_JSON }}
        run: python scripts/meta_optimizer.py

      - name: 🗺️ Sitemap + Indexing — ping updated pages
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
          GOOGLE_SA_JSON: ${{ secrets.GOOGLE_SA_JSON }}
        run: python scripts/sitemap_and_index.py

      - name: 📤 Commit all changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Weekly: meta optimized + backlink drafts ready [skip ci]"
          commit_user_name: "PayMatrix Bot"
          commit_user_email: "bot@paymatrixcalc.com"
